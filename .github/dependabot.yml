# Dependabot — mantém dependências atualizadas e seguras automaticamente.
# Documentação: https://docs.github.com/code-security/dependabot
version: 2
updates:
  # Atualiza as Actions usadas no pipeline de CI
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels: ["dependencies", "ci"]

  # Monitora as dependências Python do projeto 01 (análise exploratória)
  - package-ecosystem: "pip"
    directory: "/projetos-academicos/01-analise-exploratoria-vendas"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels: ["dependencies", "python"]

  # Monitora as dependências Python do projeto 02 (classificação Iris)
  - package-ecosystem: "pip"
    directory: "/projetos-academicos/02-classificacao-iris-ml"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
    labels: ["dependencies", "python"]
